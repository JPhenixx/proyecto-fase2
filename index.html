<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetín Central - UCV</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header>
        <h1>☕ Cafetín Central UCV</h1>
    </header>

    <section id="seccion-login">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="usuario" placeholder="Nombre de usuario">
        <input type="password" id="clave" placeholder="Contraseña">
        <button id="btn-entrar">Entrar</button>
        <p id="mensaje-error" style="color: red;"></p>
    </section>

    <section id="seccion-catalogo" style="display: none;">
        <h2>🍴 Menú de Hoy</h2>
        <div id="contenedor-productos"></div>
        <hr>
        <h3>🛒 Tu Carrito (<span id="cuenta-carrito">0</span>)</h3>
        <ul id="lista-carrito"></ul>
        <p>Total a Pagar: $<span id="monto-total">0.00</span></p>
        <button id="btn-finalizar" onclick="finalizarPedido()" style="background: green; color: white;">Finalizar Pedido</button>
        <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </section>

    <section id="seccion-cajero" style="display: none;">
        <h2>📊 Panel de Ventas (Cajero)</h2>
        <ul id="lista-ventas-procesadas">
            <li>No hay ventas hoy.</li>
        </ul>
        <button onclick="cerrarSesion()">Cerrar Sesión / Salir</button>
    </section>

    <script src="logica.js"></script>
</body>
</html>
